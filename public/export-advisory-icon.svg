<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 960" fill="none">
  <!-- Background -->
  <rect width="800" height="960" fill="#001F4D"/>
  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="720" x2="800" y2="720"/>
    <line x1="0" y1="840" x2="800" y2="840"/>
    <line x1="133" y1="0" x2="133" y2="960"/>
    <line x1="266" y1="0" x2="266" y2="960"/>
    <line x1="400" y1="0" x2="400" y2="960"/>
    <line x1="533" y1="0" x2="533" y2="960"/>
    <line x1="666" y1="0" x2="666" y2="960"/>
  </g>

  <!-- Globe outline -->
  <circle cx="400" cy="420" r="210" stroke="#2E8B57" stroke-width="3" fill="none" opacity="0.5"/>
  <circle cx="400" cy="420" r="210" stroke="#2E8B57" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Latitude lines -->
  <ellipse cx="400" cy="420" rx="210" ry="80" stroke="#2E8B57" stroke-width="1.5" fill="none" opacity="0.3"/>
  <ellipse cx="400" cy="420" rx="210" ry="150" stroke="#2E8B57" stroke-width="1" fill="none" opacity="0.2"/>
  <!-- Longitude lines -->
  <ellipse cx="400" cy="420" rx="80" ry="210" stroke="#2E8B57" stroke-width="1.5" fill="none" opacity="0.3"/>
  <line x1="400" y1="210" x2="400" y2="630" stroke="#2E8B57" stroke-width="1.5" opacity="0.3"/>
  <line x1="190" y1="420" x2="610" y2="420" stroke="#2E8B57" stroke-width="1.5" opacity="0.3"/>

  <!-- Document icon (center) -->
  <rect x="338" y="340" width="124" height="160" rx="6" fill="#002D6E" stroke="#2E8B57" stroke-width="2.5"/>
  <!-- Doc lines -->
  <line x1="358" y1="378" x2="442" y2="378" stroke="#2E8B57" stroke-width="2.5" opacity="0.9"/>
  <line x1="358" y1="400" x2="442" y2="400" stroke="#2E8B57" stroke-width="2.5" opacity="0.7"/>
  <line x1="358" y1="422" x2="420" y2="422" stroke="#2E8B57" stroke-width="2.5" opacity="0.5"/>
  <!-- Doc fold corner -->
  <polyline points="438,340 438,360 458,360" stroke="#2E8B57" stroke-width="2" fill="none" opacity="0.8"/>
  <!-- Tick / approval mark -->
  <polyline points="362,462 376,478 414,448" stroke="#C9922A" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow pointing right/up (export direction) -->
  <g opacity="0.85">
    <line x1="480" y1="310" x2="540" y2="250" stroke="#C9922A" stroke-width="3.5" stroke-linecap="round"/>
    <polyline points="510,248 540,250 538,280" stroke="#C9922A" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- NEPC badge circle -->
  <circle cx="560" cy="530" r="44" fill="#001F4D" stroke="#C9922A" stroke-width="2.5"/>
  <text x="560" y="524" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#C9922A" letter-spacing="2">NEPC</text>
  <text x="560" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#ffffff" opacity="0.7" letter-spacing="1">REGISTERED</text>

  <!-- NCS badge circle -->
  <circle cx="240" cy="530" r="44" fill="#001F4D" stroke="#2E8B57" stroke-width="2.5"/>
  <text x="240" y="524" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#2E8B57" letter-spacing="2">NCS</text>
  <text x="240" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#ffffff" opacity="0.7" letter-spacing="1">LICENSED</text>

  <!-- Label at bottom -->
  <rect x="200" y="700" width="400" height="2" fill="#2E8B57" opacity="0.4"/>
  <text x="400" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="4" opacity="0.9">EXPORT ADVISORY</text>
  <text x="400" y="778" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2E8B57" letter-spacing="3" opacity="0.8">RAISEVISION AND COMPANY LIMITED</text>

  <!-- Decorative dots -->
  <circle cx="180" cy="240" r="3" fill="#C9922A" opacity="0.6"/>
  <circle cx="620" cy="180" r="3" fill="#2E8B57" opacity="0.6"/>
  <circle cx="650" cy="680" r="3" fill="#C9922A" opacity="0.6"/>
  <circle cx="150" cy="700" r="3" fill="#2E8B57" opacity="0.6"/>
</svg>
